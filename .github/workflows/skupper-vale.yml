name: Skupper Docs Vale Lint

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write

jobs:
  skupper-vale:
    runs-on: ubuntu-latest
    steps:
      - name: Check out sk-vale
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install kramdoc
        run: gem install kramdown-asciidoc

      - name: Install Vale
        run: |
          VALE_VERSION=3.9.5
          wget -qO- "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | tar xz -C /usr/local/bin vale

      - name: Clone skupper-docs
        run: git clone --depth 1 https://github.com/skupperproject/skupper-docs.git

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run conversion and linting
        id: lint
        continue-on-error: true
        run: bash scripts/convert-skupper.sh --input-dir skupper-docs/input --commit

      - name: Push skupper branch
        run: git push origin skupper --force
